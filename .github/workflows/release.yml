name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Prepare stable signing
        env:
          APPLE_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.APPLE_CODESIGN_CERTIFICATE_BASE64 }}
          APPLE_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERTIFICATE_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          RCODESIGN_CERT_PEM: ${{ secrets.RCODESIGN_CERT_PEM }}
          RCODESIGN_KEY_PEM: ${{ secrets.RCODESIGN_KEY_PEM }}
        run: |
          if [ -n "$APPLE_CODESIGN_IDENTITY" ]; then
            : "${APPLE_CODESIGN_CERTIFICATE_BASE64:?APPLE_CODESIGN_CERTIFICATE_BASE64 secret is required when APPLE_CODESIGN_IDENTITY is configured}"
            : "${APPLE_CODESIGN_CERTIFICATE_PASSWORD:?APPLE_CODESIGN_CERTIFICATE_PASSWORD secret is required when APPLE_CODESIGN_IDENTITY is configured}"

            CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
            KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
            KEYCHAIN_PASSWORD="$(uuidgen)"

            echo "$APPLE_CODESIGN_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import "$CERTIFICATE_PATH" -P "$APPLE_CODESIGN_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security list-keychains -d user -s "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"

            echo "RELEASE_SIGNING_STRATEGY=codesign" >> "$GITHUB_ENV"
            exit 0
          fi

          : "${RCODESIGN_CERT_PEM:?RCODESIGN_CERT_PEM secret is required when APPLE_CODESIGN_IDENTITY is not configured}"
          : "${RCODESIGN_KEY_PEM:?RCODESIGN_KEY_PEM secret is required when APPLE_CODESIGN_IDENTITY is not configured}"

          if ! command -v rcodesign >/dev/null 2>&1; then
            if ! command -v cargo >/dev/null 2>&1; then
              echo "error: cargo is required to install rcodesign for release signing." >&2
              exit 1
            fi
            cargo install apple-codesign --locked
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

          RCODESIGN_CERT_PATH="$RUNNER_TEMP/swyper-rcodesign.crt"
          RCODESIGN_KEY_PATH="$RUNNER_TEMP/swyper-rcodesign.key"
          printf '%s\n' "$RCODESIGN_CERT_PEM" > "$RCODESIGN_CERT_PATH"
          printf '%s\n' "$RCODESIGN_KEY_PEM" > "$RCODESIGN_KEY_PATH"
          chmod 600 "$RCODESIGN_KEY_PATH"

          echo "RCODESIGN_CERT=$RCODESIGN_CERT_PATH" >> "$GITHUB_ENV"
          echo "RCODESIGN_KEY=$RCODESIGN_KEY_PATH" >> "$GITHUB_ENV"
          echo "RELEASE_SIGNING_STRATEGY=rcodesign" >> "$GITHUB_ENV"

      - name: Install icon build dependency
        run: brew list librsvg >/dev/null 2>&1 || brew install librsvg

      - name: Build app bundle
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          if [ "$RELEASE_SIGNING_STRATEGY" = "codesign" ]; then
            echo "Building release with configured signing identity."
            make bundle RELEASE=1 CODESIGN_IDENTITY="$CODESIGN_IDENTITY"
          else
            echo "Building release with stable rcodesign fallback."
            make bundle RELEASE=1 RCODESIGN_CERT="$RCODESIGN_CERT" RCODESIGN_KEY="$RCODESIGN_KEY"
          fi

      - name: Verify signed app bundle
        run: |
          codesign --verify --deep --strict --verbose=2 build/Swyper.app/Contents/Frameworks/Sparkle.framework
          codesign --verify --deep --strict --verbose=2 build/Swyper.app

      - name: Create release archive
        run: |
          cd build
          zip -ry Swyper.zip Swyper.app

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION=$(grep -A5 '"sparkle"' Package.resolved | grep '"version"' | sed 's/.*: "//;s/".*//')
          curl -sL -o /tmp/sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle-tools
          tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle-tools

      - name: Sign update and generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION=$(cat VERSION)
          SIGNATURE=$(/tmp/sparkle-tools/bin/sign_update build/Swyper.zip --ed-key-file <(echo "$SPARKLE_PRIVATE_KEY"))
          LENGTH=$(stat -f%z build/Swyper.zip)
          ED_SIGNATURE=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')
          DOWNLOAD_URL="https://github.com/asmeurer/swyper/releases/download/v${VERSION}/Swyper.zip"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          # Extract changelog for this version and convert to HTML
          CHANGELOG_HTML=$(python3 -c "
          import re, html, sys
          text = open('CHANGELOG.md').read()
          # Match section for this version
          pattern = r'^## \[${VERSION}\].*?\n(.*?)(?=^## \[|\Z)'
          m = re.search(pattern, text, re.MULTILINE | re.DOTALL)
          if not m:
              print('<p>Bug fixes and improvements.</p>')
              sys.exit(0)
          body = m.group(1).strip()
          lines = body.split('\n')
          result = []
          in_list = False
          for line in lines:
              line = line.strip()
              if not line:
                  if in_list:
                      result.append('</ul>')
                      in_list = False
                  continue
              if line.startswith('- '):
                  if not in_list:
                      result.append('<ul>')
                      in_list = True
                  result.append(f'<li>{html.escape(line[2:])}</li>')
              else:
                  if in_list:
                      result.append('</ul>')
                      in_list = False
                  result.append(f'<p>{html.escape(line)}</p>')
          if in_list:
              result.append('</ul>')
          print('\n'.join(result))
          ")

          cat > appcast.xml <<APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Swyper Updates</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <description><![CDATA[${CHANGELOG_HTML}]]></description>
                <enclosure url="${DOWNLOAD_URL}"
                           sparkle:edSignature="${ED_SIGNATURE}"
                           length="${LENGTH}"
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat VERSION)
          gh release create "v${VERSION}" build/Swyper.zip \
            --title "Swyper v${VERSION}" \
            --generate-notes

      - name: Update appcast in repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add appcast.xml
          git commit -m "Update appcast.xml for v$(cat VERSION)"
          git push origin main
