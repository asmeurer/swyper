name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install icon build dependency
        run: brew list librsvg >/dev/null 2>&1 || brew install librsvg

      - name: Build app bundle
        run: make bundle

      - name: Run tests
        run: swift test
